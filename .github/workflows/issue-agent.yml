name: Issue Agent — AI-powered issue handler

on:
  issues:
    types: [labeled]

concurrency:
  group: issue-agent-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  handle-issue:
    runs-on: ubuntu-latest
    # Only trigger when the 'ai-agent' label is added (single trigger point)
    if: github.event.label.name == 'ai-agent'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Claude Code Agent
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            You are an AI agent for the Arova website (arova-ai.com).

            A new GitHub issue has been created:

            **Title:** ${{ github.event.issue.title }}
            **Body:** ${{ github.event.issue.body }}
            **Labels:** ${{ join(github.event.issue.labels.*.name, ', ') }}
            **Author:** ${{ github.event.issue.user.login }}

            ## Your Task

            Analyze this issue and take appropriate action:

            ### If it's a content update request:
            1. Read the brand-website skill at `.claude/skills/brand-website/SKILL.md` to understand the project structure
            2. Modify the appropriate locale files (`src/i18n/zh-TW.json` and/or `src/i18n/en.json`)
            3. If a new page is needed, create it following the patterns in existing pages
            4. Run `npm run build` to verify the changes compile
            5. Commit the changes with a descriptive message

            ### If it's a bug report:
            1. Investigate the issue by reading the relevant source files
            2. Fix the bug if possible
            3. Run `npm run build` to verify
            4. Commit the fix

            ### If it's a question or discussion:
            1. Analyze the codebase to find the answer
            2. Do NOT make any code changes

            ## Important Rules
            - The site uses Astro 5.x + Tailwind CSS v4 + React islands
            - Content is in `src/i18n/zh-TW.json` (Traditional Chinese, default) and `src/i18n/en.json`
            - Both locale files must stay in sync (same key structure)
            - zh-TW pages are at root URLs, en pages at /en/ prefix
            - Always run `npm run build` before committing to verify changes
            - Keep changes minimal and focused on the issue

          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
          model: claude-sonnet-4-6

      - name: Create PR and auto-merge
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          BRANCH=$(git branch -r --contains HEAD 2>/dev/null | grep -v 'origin/main' | head -1 | sed 's|origin/||;s|^ *||')

          # If no branch found, check for claude branches
          if [ -z "$BRANCH" ]; then
            BRANCH=$(git branch -r | grep "claude/issue-${ISSUE_NUMBER}" | tail -1 | sed 's|origin/||;s|^ *||')
          fi

          if [ -z "$BRANCH" ]; then
            echo "No feature branch found, skipping PR creation"
            exit 0
          fi

          echo "Found branch: $BRANCH"

          # Check if there are actual changes vs main
          DIFF=$(git diff origin/main...origin/$BRANCH --stat 2>/dev/null)
          if [ -z "$DIFF" ]; then
            echo "No changes to merge"
            exit 0
          fi

          # Create PR
          PR_URL=$(gh pr create \
            --head "$BRANCH" \
            --base main \
            --title "Auto: ${{ github.event.issue.title }}" \
            --body "Automated changes for #${ISSUE_NUMBER}.

          Closes #${ISSUE_NUMBER}

          Generated by AI Issue Agent." 2>&1)

          echo "PR created: $PR_URL"

          # Extract PR number
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')

          if [ -n "$PR_NUMBER" ]; then
            # Auto-merge
            sleep 5
            gh pr merge "$PR_NUMBER" --merge --delete-branch
            echo "PR #${PR_NUMBER} merged and branch deleted"
          fi
