name: Issue Agent — AI-powered issue handler

on:
  issues:
    types: [labeled]

concurrency:
  group: issue-agent-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  handle-issue:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'ai-agent'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Claude Code Agent
        id: claude
        uses: anthropics/claude-code-action@beta
        env:
          GANDI_PAT: ${{ secrets.GANDI_PAT }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            You are an AI agent for the Arova website (arova-ai.com).

            A new GitHub issue has been created:

            **Title:** ${{ github.event.issue.title }}
            **Body:** ${{ github.event.issue.body }}
            **Labels:** ${{ join(github.event.issue.labels.*.name, ', ') }}
            **Author:** ${{ github.event.issue.user.login }}

            ## Your Capabilities

            You can handle THREE types of tasks:

            ### 1. Website Content (code changes)
            Content updates, bug fixes, new pages, text changes.
            - Read `.claude/skills/brand-website/SKILL.md` for project structure
            - Modify locale files (`src/i18n/zh-TW.json` and `src/i18n/en.json`)
            - Create/edit Astro pages if needed
            - Run `npm run build` to verify (requires Node.js >= 22)
            - Commit changes

            ### 2. DNS & Email Management (API calls)
            DNS records, email forwarding, domain configuration for arova-ai.com.
            - Read `.claude/skills/gandi-arova/SKILL.md` for Gandi API reference
            - Use the GANDI_PAT environment variable for authentication: `curl -H "Authorization: Bearer $GANDI_PAT" ...`
            - API base: `https://api.gandi.net/v5`
            - DNS records: `GET/PUT/POST/DELETE /livedns/domains/arova-ai.com/records/...`
            - Email forwards: `GET/POST/PUT/DELETE /email/forwards/arova-ai.com/...`
            - Always list current records BEFORE making changes
            - Do NOT modify MX, SPF, or DKIM records unless explicitly asked

            ### 3. Questions & Analysis
            If the issue is a question, analyze the codebase or DNS to answer it. No changes needed.

            ## Important Rules
            - The site uses Astro 5.x + Tailwind CSS v4 + React islands
            - Content is in `src/i18n/zh-TW.json` (Traditional Chinese) and `src/i18n/en.json`
            - Both locale files must stay in sync (same key structure)
            - zh-TW pages are at root URLs, en pages at /en/ prefix
            - Always verify before committing (build for code, GET for DNS)
            - Keep changes minimal and focused on the issue
            - For DNS changes, create a snapshot first: `POST /livedns/domains/arova-ai.com/snapshots`

          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
          model: claude-sonnet-4-6

      - name: Create PR and auto-merge
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          BRANCH=$(git branch -r --contains HEAD 2>/dev/null | grep -v 'origin/main' | head -1 | sed 's|origin/||;s|^ *||')

          if [ -z "$BRANCH" ]; then
            BRANCH=$(git branch -r | grep "claude/issue-${ISSUE_NUMBER}" | tail -1 | sed 's|origin/||;s|^ *||')
          fi

          if [ -z "$BRANCH" ]; then
            echo "No feature branch found, skipping PR creation"
            exit 0
          fi

          echo "Found branch: $BRANCH"

          DIFF=$(git diff origin/main...origin/$BRANCH --stat 2>/dev/null)
          if [ -z "$DIFF" ]; then
            echo "No changes to merge"
            exit 0
          fi

          PR_URL=$(gh pr create \
            --head "$BRANCH" \
            --base main \
            --title "Auto: ${{ github.event.issue.title }}" \
            --body "Automated changes for #${ISSUE_NUMBER}.

          Closes #${ISSUE_NUMBER}

          Generated by AI Issue Agent." 2>&1)

          echo "PR created: $PR_URL"

          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')

          if [ -n "$PR_NUMBER" ]; then
            sleep 5
            gh pr merge "$PR_NUMBER" --merge --delete-branch
            echo "PR #${PR_NUMBER} merged and branch deleted"
          fi
